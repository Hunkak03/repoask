<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RepoAsk — Chat con tu código local</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #0f0f1a;
      --border: #1e1e32;
      --border-bright: #2e2e52;
      --accent: #7fff9a;
      --accent2: #4f9eff;
      --accent3: #ff6b9d;
      --text: #d4d4e8;
      --text-dim: #6b6b8a;
      --text-bright: #f0f0ff;
      --user-bubble: #131326;
      --ai-bubble: #0c1a0f;
      --glow: rgba(127, 255, 154, 0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(127,255,154,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(127,255,154,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .app {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      padding: 14px 28px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 16px;
      background: rgba(10,10,15,0.8);
      backdrop-filter: blur(12px);
      flex-shrink: 0;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 20px;
      color: var(--accent);
    }

    .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--text-dim);
    }
    .status-dot.active {
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
    }

    .status-label { font-size: 11px; color: var(--text-dim); }
    .status-label.active { color: var(--accent); }

    .repo-bar {
      padding: 12px 28px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .load-btn {
      background: var(--accent);
      color: #000;
      border: none;
      padding: 7px 18px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 700;
      border-radius: 4px;
      cursor: pointer;
    }

    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px 28px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .message { display: flex; flex-direction: column; gap: 6px; }
    .message.user { align-items: flex-end; }
    .message.ai { align-items: flex-start; }

    .msg-bubble {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.6;
    }
    .message.user .msg-bubble { background: var(--user-bubble); border: 1px solid var(--border-bright); }
    .message.ai .msg-bubble { background: var(--ai-bubble); border: 1px solid rgba(127,255,154,0.15); }

    .input-bar {
      padding: 16px 28px;
      border-top: 1px solid var(--border);
      background: rgba(10,10,15,0.9);
    }

    .input-row {
      display: flex;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border-bright);
      border-radius: 8px;
      padding: 10px;
    }

    textarea {
      flex: 1;
      background: none;
      border: none;
      color: var(--text-bright);
      font-family: 'JetBrains Mono', monospace;
      resize: none;
      outline: none;
    }

    .send-btn {
      background: var(--accent);
      border: none;
      width: 34px; height: 34px;
      border-radius: 6px;
      cursor: pointer;
    }

    .thinking { font-size: 12px; color: var(--accent); margin: 10px 0; }
  </style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">RepoAsk</div>
    <div class="header-right">
      <div class="status-dot" id="statusDot"></div>
      <span class="status-label" id="statusLabel">Repositorio no cargado</span>
    </div>
  </header>

  <div class="repo-bar">
    <button class="load-btn" onclick="loadRepo()">Activar Chat Local</button>
    <p id="repoMeta" style="font-size: 11px; margin-top: 5px; color: var(--text-dim);">
      Haz clic para empezar a analizar el contenido de /codigo_a_analizar
    </p>
  </div>

  <div class="chat-area" id="chatArea">
    <div id="emptyState" style="text-align: center; margin-top: 40px; opacity: 0.5;">
      <h2>Bienvenido</h2>
      <p>Pulsa "Activar Chat Local" para empezar.</p>
    </div>
  </div>

  <div class="input-bar">
    <div class="input-row">
      <textarea id="questionInput" rows="1" placeholder="Haz una pregunta sobre el código..."></textarea>
      <button class="send-btn" id="sendBtn" onclick="ask()" disabled>🚀</button>
    </div>
  </div>
</div>

<script>
  let isThinking = false;

  function addMessage(role, content) {
    const area = document.getElementById('chatArea');
    const wrap = document.createElement('div');
    wrap.className = `message ${role}`;
    
    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.textContent = content;

    wrap.appendChild(bubble);
    area.appendChild(wrap);
    area.scrollTop = area.scrollHeight;
  }

  function showThinking() {
    const area = document.getElementById('chatArea');
    const el = document.createElement('div');
    el.id = 'thinking';
    el.className = 'thinking';
    el.textContent = '... Analizando código ...';
    area.appendChild(el);
  }

  function hideThinking() {
    const el = document.getElementById('thinking');
    if (el) el.remove();
  }

  async function ask() {
    const input = document.getElementById('questionInput');
    const question = input.value.trim();
    if (!question || isThinking) return;

    isThinking = true;
    document.getElementById('sendBtn').disabled = true;
    addMessage('user', question);
    showThinking();

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: question })
      });
      const data = await res.json();
      hideThinking();
      addMessage('ai', data.response);
    } catch (e) {
      hideThinking();
      addMessage('ai', "Error al conectar con el servidor.");
    } finally {
      isThinking = false;
      document.getElementById('sendBtn').disabled = false;
      input.value = '';
    }
  }

  function loadRepo() {
    document.getElementById('statusDot').classList.add('active');
    document.getElementById('statusLabel').textContent = 'Código Local Activo';
    document.getElementById('statusLabel').classList.add('active');
    document.getElementById('sendBtn').disabled = false;
    const es = document.getElementById('emptyState');
    if (es) es.remove();
    document.getElementById('repoMeta').textContent = "✓ Analizando carpeta 'codigo_a_analizar'";
  }
</script>
</body>
</html>
