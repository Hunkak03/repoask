<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RepoAsk — Code Auditor Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0a0f; --surface: #0f0f1a; --border: #1e1e32; --border-bright: #2e2e52;
      --accent: #7fff9a; --accent2: #4f9eff; --text: #d4d4e8; --text-dim: #6b6b8a;
      --text-bright: #f0f0ff; --user-bubble: #131326; --ai-bubble: #0c1a0f;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'JetBrains Mono', monospace; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    header { padding: 14px 28px; border-bottom: 1px solid var(--border); display: flex; align-items: center; background: rgba(10,10,15,0.8); backdrop-filter: blur(12px); z-index: 10; }
    .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 20px; color: var(--accent); letter-spacing: -1px; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-dim); margin-left: auto; margin-right: 8px; }
    .status-dot.active { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
    
    .chat-area { flex: 1; overflow-y: auto; padding: 24px 28px; display: flex; flex-direction: column; gap: 20px; }
    .message { display: flex; flex-direction: column; gap: 8px; max-width: 85%; }
    .message.user { align-self: flex-end; align-items: flex-end; }
    .message.ai { align-self: flex-start; align-items: flex-start; }
    .msg-bubble { padding: 14px 18px; border-radius: 12px; font-size: 13px; line-height: 1.6; white-space: pre-wrap; }
    .message.user .msg-bubble { background: var(--user-bubble); border: 1px solid var(--border-bright); color: var(--text-bright); }
    .message.ai .msg-bubble { background: var(--ai-bubble); border: 1px solid rgba(127,255,154,0.15); border-left: 4px solid var(--accent); }
    
    .sources-container { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
    .source-tag { font-size: 10px; background: rgba(79, 158, 255, 0.1); border: 1px solid var(--accent2); color: var(--accent2); padding: 2px 8px; border-radius: 4px; font-weight: bold; }

    .input-bar { padding: 16px 28px; border-top: 1px solid var(--border); background: var(--bg); }
    .quick-actions { display: flex; gap: 10px; margin-bottom: 12px; justify-content: center; }
    .action-btn { background: transparent; border: 1px solid var(--border-bright); color: var(--text-dim); padding: 6px 14px; border-radius: 20px; font-size: 11px; cursor: pointer; transition: 0.2s; font-family: inherit; }
    .action-btn:hover:not(:disabled) { border-color: var(--accent2); color: var(--accent2); background: rgba(79, 158, 255, 0.05); }
    
    .input-row { display: flex; gap: 10px; background: var(--surface); border: 1px solid var(--border-bright); border-radius: 12px; padding: 12px; }
    textarea { flex: 1; background: none; border: none; color: var(--text-bright); font-family: inherit; resize: none; outline: none; font-size: 14px; }
    .send-btn { background: var(--accent); border: none; width: 40px; height: 40px; border-radius: 8px; cursor: pointer; font-size: 18px; transition: 0.2s; }
    .send-btn:hover:not(:disabled) { transform: scale(1.05); filter: brightness(1.1); }
    .send-btn:disabled { opacity: 0.2; cursor: not-allowed; }
  </style>
</head>
<body>

<header>
  <div class="logo">RepoAsk <span style="font-size: 10px; color: var(--text-dim); vertical-align: middle; margin-left: 5px;">v2.0 AUDITOR</span></div>
  <div class="status-dot" id="statusDot"></div>
  <span id="statusLabel" style="font-size: 11px; color: var(--text-dim)">Desconectado</span>
</header>

<div class="chat-area" id="chatArea">
  <div id="welcome" style="text-align: center; margin-top: 50px; color: var(--text-dim);">
    <h2 style="color: var(--text-bright); margin-bottom: 10px;">Analizador de Repositorios</h2>
    <p style="font-size: 13px; margin-bottom: 20px;">Carga tu código en la carpeta 'codigo_a_analizar' para empezar.</p>
    <button onclick="activate()" id="actBtn" style="background: var(--accent); border: none; padding: 12px 24px; border-radius: 8px; font-weight: bold; cursor: pointer; font-family: 'Syne';">INICIAR SESIÓN DE AUDITORÍA</button>
  </div>
</div>

<div class="input-bar">
  <div class="quick-actions">
    <button onclick="quickAction('audit')" class="action-btn" id="auditBtn" disabled>🔍 AUDITAR SEGURIDAD</button>
    <button onclick="quickAction('docs')" class="action-btn" id="docsBtn" disabled>📄 GENERAR DOCUMENTACIÓN</button>
  </div>
  <div class="input-row">
    <textarea id="userInput" rows="1" placeholder="Haz una pregunta técnica..." disabled></textarea>
    <button class="send-btn" id="sendBtn" onclick="ask()" disabled>🚀</button>
  </div>
</div>

<script>
  let active = false;

  function activate() {
    active = true;
    document.getElementById('statusDot').classList.add('active');
    document.getElementById('statusLabel').textContent = 'Motor RAG Activo';
    document.getElementById('userInput').disabled = false;
    document.getElementById('sendBtn').disabled = false;
    document.getElementById('auditBtn').disabled = false;
    document.getElementById('docsBtn').disabled = false;
    document.getElementById('welcome').style.display = 'none';
  }

  async function ask() {
    const input = document.getElementById('userInput');
    const text = input.value.trim();
    if (!text) return;

    addMessage('user', text);
    input.value = '';

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text })
      });
      const data = await res.json();
      addMessage('ai', data.response, data.sources);
    } catch (e) {
      addMessage('ai', "Error crítico: El servidor no responde.");
    }
  }

  function quickAction(type) {
    const input = document.getElementById('userInput');
    if (type === 'audit') {
      input.value = "Realiza una auditoría técnica completa del código analizado. Identifica vulnerabilidades, errores de lógica y sugerencias de mejora según estándares de la industria.";
    } else if (type === 'docs') {
      input.value = "Genera una documentación técnica exhaustiva en Markdown que describa la estructura de archivos, las funciones clave y la lógica general del proyecto.";
    }
    ask();
  }

  function addMessage(role, content, sources = []) {
    const area = document.getElementById('chatArea');
    const msgDiv = document.createElement('div');
    msgDiv.className = `message ${role}`;
    
    let html = `<div class="msg-bubble">${content}</div>`;
    
    if (sources.length > 0) {
      html += `<div class="sources-container">`;
      sources.forEach(s => html += `<span class="source-tag">FILE: ${s}</span>`);
      html += `</div>`;
    }
    
    msgDiv.innerHTML = html;
    area.appendChild(msgDiv);
    area.scrollTop = area.scrollHeight;
  }
</script>
</body>
</html>
